<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ember</title>
    <script>
      // Single-Page Apps for GitHub Pages
      // MIT License — Rafael Pedicini, https://github.com/rafgraph/spa-github-pages
      // This script captures the requested deep-link path and rewrites the URL
      // so that index.html can decode it back into a real route after load.
      (function () {
        var pathSegmentsToKeep = 0; // apex custom domain — no subpath
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
