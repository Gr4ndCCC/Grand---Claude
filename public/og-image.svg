<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf6ef"/>
      <stop offset="1" stop-color="#efe7dd"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.08 0 0 0 0 0.07 0 0 0 0 0.06 0 0 0 0.06 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect width="1200" height="630" fill="url(#paper)" filter="url(#grain)"/>
  <g font-family="'Newsreader', 'Iowan Old Style', Georgia, serif">
    <text x="80" y="120" font-size="20" letter-spacing="2.4" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#b85332" text-transform="uppercase">EMBER · BACKYARD BBQ</text>
    <text x="80" y="290" font-size="92" font-weight="500" fill="#0c0a09">Three people flaked</text>
    <text x="80" y="390" font-size="92" font-weight="500" fill="#0c0a09">last time. Tonight,</text>
    <text x="80" y="490" font-size="92" font-style="italic" fill="#b85332">nobody does.</text>
    <text x="80" y="570" font-size="22" letter-spacing="2.4" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#6b6258">RSVP · CLAIM A DISH · SHOW UP</text>
  </g>
  <g transform="translate(1080,80)">
    <circle r="14" fill="#b85332"/>
    <circle r="7" fill="#f6f1ea"/>
  </g>
</svg>
