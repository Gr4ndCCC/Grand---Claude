name: Deploy Ember to GitHub Pages

on:
  push:
    branches: [main, "claude/build-ember-website-JmrLt"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npx vite build
        env:
          DEPLOY_TARGET: gh-pages
          VITE_SITE_URL: https://emberworld.co
          VITE_LS_MONTHLY_URL: ${{ secrets.VITE_LS_MONTHLY_URL }}
          VITE_LS_ANNUAL_URL: ${{ secrets.VITE_LS_ANNUAL_URL }}
          VITE_EMAIL_API_URL: ${{ secrets.VITE_EMAIL_API_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deploy
